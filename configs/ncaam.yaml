extends: configs/default.yaml
project:
  name: ncaam_forecast

paths:
  raw_dir: data/raw
  interim_dir: data/interim/ncaam
  processed_dir: data/processed/ncaam
  artifacts_dir: artifacts
  db_path: data/processed/ncaam_forecast.db

data:
  league: NCAAM
  season_start: "2025-11-01"
  season_end: "2026-04-15"
  history_days: 160
  upcoming_days: 14
  offline_mode: false
  timeout_seconds: 30
  max_retries: 4
  backoff_seconds: 1.5

modeling:
  random_seed: 42
  cv_splits: 5
  rolling_windows_days: [7, 30, 60, 90]
  calibration_bins: 10

validation_split:
  mode: train_validation_test
  method: time
  random_seed:

bayes:
  process_variance: 0.08
  prior_variance: 1.5
  observation_scale: 1.0
  posterior_draws: 500

runtime:
  retrain_daily: true
  embargo_days: 1
