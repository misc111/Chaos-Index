name: Publish Sanitized Staging Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-site
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      STAGING_REPO: misc111/chaos-index-staging
      STAGING_REPO_NAME: chaos-index-staging
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Verify committed staging snapshot
        run: |
          test -f web/public/staging-data/manifest.json
          test -f web/public/staging-data/nhl/predictions.json
          test -f web/public/staging-data/nba/predictions.json

      - name: Build static staging site
        working-directory: web
        env:
          PAGES_REPO_NAME: ${{ env.STAGING_REPO_NAME }}
        run: npm run build:pages

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_DEPLOY_KEY }}

      - name: Add GitHub to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Publish site to external repo
        run: |
          target_dir="$(mktemp -d)"
          git clone "git@github.com:${STAGING_REPO}.git" "$target_dir"
          rsync -a --delete --exclude '.git' web/out/ "$target_dir"/
          touch "$target_dir/.nojekyll"
          cd "$target_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No staging site changes to publish."
            exit 0
          fi
          git add .
          if git diff --cached --quiet; then
            echo "No staged staging-site changes."
            exit 0
          fi
          git commit -m "Publish sanitized staging site"
          git push origin main
